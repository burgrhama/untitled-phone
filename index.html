<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>pirated untitled · drag to reorder</title>

<!-- PWA -->
<link rel="manifest" href="/untitled123111/manifest.json">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #000;
  color: #eee;
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  overflow-x: hidden;
  min-height: 100vh;
}

/* Auth Overlay */
#authOverlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #000;
  z-index: 1000;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

#authOverlay.hidden {
  display: none;
}

.auth-box {
  background: #111;
  padding: 40px;
  border-radius: 16px;
  width: 90%;
  max-width: 400px;
  border: 1px solid #333;
}

.auth-box h2 {
  margin-bottom: 20px;
  font-size: 24px;
}

.auth-box input {
  width: 100%;
  padding: 12px;
  margin-bottom: 15px;
  background: #222;
  border: 1px solid #444;
  color: #eee;
  border-radius: 8px;
}

.auth-box input:focus {
  outline: none;
  border-color: #1db954;
}

.auth-box button {
  width: 100%;
  padding: 12px;
  background: #1db954;
  color: #fff;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 600;
  margin-bottom: 10px;
}

.auth-box button:hover {
  background: #1ed760;
}

.auth-toggle {
  text-align: center;
  color: #aaa;
  font-size: 14px;
}

.auth-toggle a {
  color: #1db954;
  cursor: pointer;
  text-decoration: underline;
}

.error {
  color: #ff6b6b;
  margin-bottom: 15px;
  font-size: 14px;
}

/* canvas */
#particleCanvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;
}

/* header */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px;
}

header h1 {
  font-size: 28px;
  cursor: pointer;
}

.btn {
  background: #222;
  color: #fff;
  border: 1px solid #444;
  padding: 10px 16px;
  border-radius: 20px;
  cursor: pointer;
}

.btn:hover {
  background: #333;
}

.btn-logout {
  background: #ff6b6b;
  border-color: #ff6b6b;
}

/* grid */
.album-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, 140px);
  gap: 20px;
  padding: 20px;
}

.album-card img {
  width: 100%;
  border-radius: 12px;
  cursor: pointer;
}

/* album view */
.album-view {
  display: none;
  padding: 20px;
}

.cover-large {
  width: 200px;
  height: 200px;
  border-radius: 16px;
}

/* player */
.player {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #111;
  padding: 10px;
}
</style>
</head>

<body>

<canvas id="particleCanvas"></canvas>

<!-- Auth Overlay -->
<div id="authOverlay">
  <div class="auth-box">
    <div id="authForm">
      <h2>Sign In</h2>
      <div class="error" id="authError"></div>
      <input type="email" id="authEmail" placeholder="Email">
      <input type="password" id="authPassword" placeholder="Password">
      <button onclick="handleLogin()">Sign In</button>
      <div class="auth-toggle">
        Don't have account? <a onclick="switchToSignup()">Sign Up</a>
      </div>
    </div>
    
    <div id="signupForm" style="display: none;">
      <h2>Create Account</h2>
      <div class="error" id="signupError"></div>
      <input type="email" id="signupEmail" placeholder="Email">
      <input type="password" id="signupPassword" placeholder="Password (min 6)">
      <input type="password" id="signupConfirm" placeholder="Confirm Password">
      <button onclick="handleSignup()">Sign Up</button>
      <div class="auth-toggle">
        Have account? <a onclick="switchToLogin()">Sign In</a>
      </div>
    </div>
  </div>
</div>

<header>
<h1 onclick="goHome()">pirated untitled</h1>
<div>
<button class="btn" onclick="createAlbum()">make an album</button>
<button class="btn btn-logout" onclick="logout()">Logout</button>
</div>
</header>

<div id="home" class="album-grid"></div>

<div id="albumPage" class="album-view">
  <img id="albumCover" class="cover-large">
  <h2 id="albumTitle"></h2>

  <input type="file" id="songUpload" multiple accept="audio/*">
  <button class="btn" onclick="addSongs()">add tracks</button>

  <div id="trackList"></div>
</div>

<div class="player">
<div id="nowPlaying">no track</div>
<audio id="audioPlayer" controls></audio>
</div>

<script>
// ===== API URL HELPER =====
function getApiUrl(endpoint) {
  // Always use relative path - same server
  return endpoint;
}

// ===== DATABASE =====
let db;
let currentAlbumId = null;

const request = indexedDB.open("appDB", 1);

request.onupgradeneeded = e => {
  db = e.target.result;
  db.createObjectStore("albums", { keyPath: "id", autoIncrement: true });
};

request.onsuccess = e => {
  db = e.target.result;
  checkAuth();
};

// ===== AUTH =====

async function handleLogin() {
  const email = document.getElementById('authEmail').value;
  const password = document.getElementById('authPassword').value;
  const error = document.getElementById('authError');
  
  error.textContent = '';
  
  if (!email || !password) {
    error.textContent = 'Email and password required';
    return;
  }

  try {
    const res = await fetch(getApiUrl('/api/login'), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (!res.ok) {
      error.textContent = data.error || 'Login failed';
      return;
    }

    localStorage.setItem('token', data.token);
    localStorage.setItem('email', data.email);
    
    document.getElementById('authOverlay').classList.add('hidden');
    renderHome();
  } catch (e) {
    error.textContent = 'Network error: ' + e.message;
  }
}

async function handleSignup() {
  const email = document.getElementById('signupEmail').value;
  const password = document.getElementById('signupPassword').value;
  const confirm = document.getElementById('signupConfirm').value;
  const error = document.getElementById('signupError');
  
  error.textContent = '';
  
  if (!email || !password || !confirm) {
    error.textContent = 'All fields required';
    return;
  }

  if (password !== confirm) {
    error.textContent = 'Passwords do not match';
    return;
  }

  if (password.length < 6) {
    error.textContent = 'Password must be at least 6 characters';
    return;
  }

  try {
    const res = await fetch(getApiUrl('/api/signup'), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password, confirmPassword: confirm })
    });

    const data = await res.json();

    if (!res.ok) {
      error.textContent = data.error || 'Signup failed';
      return;
    }

    localStorage.setItem('token', data.token);
    localStorage.setItem('email', data.email);
    
    document.getElementById('authOverlay').classList.add('hidden');
    renderHome();
  } catch (e) {
    error.textContent = 'Network error: ' + e.message;
  }
}

function switchToSignup() {
  document.getElementById('authForm').style.display = 'none';
  document.getElementById('signupForm').style.display = 'block';
}

function switchToLogin() {
  document.getElementById('authForm').style.display = 'block';
  document.getElementById('signupForm').style.display = 'none';
}

function logout() {
  localStorage.removeItem('token');
  localStorage.removeItem('email');
  document.getElementById('authOverlay').classList.remove('hidden');
  document.getElementById('authForm').style.display = 'block';
  document.getElementById('signupForm').style.display = 'none';
  document.getElementById('authEmail').value = '';
  document.getElementById('authPassword').value = '';
}

function checkAuth() {
  const token = localStorage.getItem('token');
  const email = localStorage.getItem('email');
  
  if (token && email) {
    document.getElementById('authOverlay').classList.add('hidden');
    renderHome();
  } else {
    document.getElementById('authOverlay').classList.remove('hidden');
  }
}

// ===== FUNCTIONS =====
function getAll(cb) {
  db.transaction("albums", "readonly")
    .objectStore("albums")
    .getAll().onsuccess = e => cb(e.target.result);
}

function save(album) {
  db.transaction("albums", "readwrite")
    .objectStore("albums")
    .put(album);
}

function createAlbum() {
  db.transaction("albums", "readwrite")
    .objectStore("albums")
    .add({ name: "untitled", tracks: [] })
    .onsuccess = renderHome;
}

function renderHome() {
  getAll(albums => {
    const home = document.getElementById("home");
    home.innerHTML = "";

    albums.forEach(album => {
      const div = document.createElement("div");
      div.className = "album-card";
      div.onclick = () => openAlbum(album.id);

      const img = document.createElement("img");
      img.src = "";
      div.appendChild(img);

      const p = document.createElement("p");
      p.textContent = album.name;
      div.appendChild(p);

      home.appendChild(div);
    });
  });
}

function openAlbum(id) {
  currentAlbumId = id;

  document.getElementById("home").style.display = "none";
  document.getElementById("albumPage").style.display = "block";

  db.transaction("albums", "readonly")
    .objectStore("albums")
    .get(id).onsuccess = e => {
      const album = e.target.result;
      document.getElementById("albumTitle").textContent = album.name;

      renderTracks(album);
    };
}

function renderTracks(album) {
  const list = document.getElementById("trackList");
  list.innerHTML = "";

  album.tracks.forEach((t, i) => {
    const div = document.createElement("div");
    div.textContent = t.name;
    div.onclick = () => playTrack(t);
    list.appendChild(div);
  });
}

function addSongs() {
  const files = document.getElementById("songUpload").files;

  db.transaction("albums", "readwrite")
    .objectStore("albums")
    .get(currentAlbumId).onsuccess = e => {
      const album = e.target.result;

      for (let file of files) {
        album.tracks.push({
          name: file.name,
          url: URL.createObjectURL(file)
        });
      }

      save(album);
      openAlbum(currentAlbumId);
    };
}

function playTrack(track) {
  const audio = document.getElementById("audioPlayer");
  audio.src = track.url;
  audio.play();

  document.getElementById("nowPlaying").textContent = track.name;
}

function goHome() {
  document.getElementById("albumPage").style.display = "none";
  document.getElementById("home").style.display = "grid";
  renderHome();
}

// ===== SERVICE WORKER =====
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/untitled123111/service-worker.js");
}
</script>

</body>
</html>
