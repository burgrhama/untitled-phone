<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>pirated untitled · drag to reorder</title>

<!-- PWA -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #000;
  color: #eee;
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  overflow-x: hidden;
  min-height: 100vh;
}

/* canvas */
#particleCanvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;
}

/* Auth Pages */
.auth-container {
  display: flex !important;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #000;
  z-index: 100;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.auth-container.hidden {
  display: none !important;
}

.auth-form {
  background: #111;
  padding: 40px;
  border-radius: 16px;
  width: 100%;
  max-width: 400px;
  border: 1px solid #333;
}

.auth-form h2 {
  margin-bottom: 20px;
  font-size: 24px;
}

.auth-form input {
  width: 100%;
  padding: 12px;
  margin-bottom: 15px;
  background: #222;
  border: 1px solid #444;
  color: #eee;
  border-radius: 8px;
  font-size: 14px;
}

.auth-form input:focus {
  outline: none;
  border-color: #666;
}

.auth-form button {
  width: 100%;
  padding: 12px;
  background: #1db954;
  color: #fff;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 10px;
}

.auth-form button:hover {
  background: #1ed760;
}

.auth-toggle {
  text-align: center;
  color: #aaa;
  font-size: 14px;
}

.auth-toggle a {
  color: #1db954;
  cursor: pointer;
  text-decoration: underline;
}

.error-message {
  color: #ff6b6b;
  margin-bottom: 15px;
  font-size: 14px;
  text-align: center;
}

.success-message {
  color: #1db954;
  margin-bottom: 15px;
  font-size: 14px;
  text-align: center;
}

/* Main App */
#appContainer {
  display: none;
}

/* header */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px;
  border-bottom: 1px solid #222;
}

header h1 {
  font-size: 28px;
  cursor: pointer;
}

.header-actions {
  display: flex;
  gap: 10px;
  align-items: center;
}

.user-email {
  font-size: 14px;
  color: #aaa;
  margin-right: 15px;
}

.btn {
  background: #222;
  color: #fff;
  border: 1px solid #444;
  padding: 10px 16px;
  border-radius: 20px;
  cursor: pointer;
  font-size: 14px;
}

.btn:hover {
  background: #333;
}

.btn-logout {
  background: #ff6b6b;
  border-color: #ff6b6b;
}

.btn-logout:hover {
  background: #ff5252;
}

/* grid */
.album-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, 140px);
  gap: 20px;
  padding: 20px;
}

.album-card {
  cursor: pointer;
}

.album-card img {
  width: 100%;
  height: 140px;
  background: #222;
  border-radius: 12px;
  object-fit: cover;
}

.album-card p {
  margin-top: 10px;
  font-size: 14px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* album view */
.album-view {
  display: none;
  padding: 20px;
}

.album-header {
  display: flex;
  gap: 30px;
  margin-bottom: 40px;
}

.cover-large {
  width: 200px;
  height: 200px;
  background: #222;
  border-radius: 16px;
}

.album-info input {
  background: #222;
  color: #eee;
  border: 1px solid #444;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 15px;
  width: 100%;
}

.album-info button {
  background: #1db954;
  color: #fff;
  border: none;
  padding: 10px 20px;
  border-radius: 8px;
  cursor: pointer;
  margin-right: 10px;
}

.album-info button:hover {
  background: #1ed760;
}

/* player */
.player {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #111;
  padding: 15px 20px;
  border-top: 1px solid #222;
  display: flex;
  gap: 15px;
  align-items: center;
}

#nowPlaying {
  flex: 1;
  font-size: 14px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

#audioPlayer {
  flex: 1;
  max-width: 300px;
  height: 30px;
}

.track {
  padding: 10px;
  margin-bottom: 5px;
  background: #111;
  border-radius: 8px;
  cursor: pointer;
  border: 1px solid #222;
}

.track:hover {
  background: #1db954;
}

#trackList {
  margin-top: 20px;
}
</style>
</head>

<body>

<canvas id="particleCanvas"></canvas>

<!-- Auth Container -->
<div id="authContainer" class="auth-container active" style="display: flex;">
  <!-- Login Form -->
  <div id="loginForm" class="auth-form" style="display: block;">
    <h2>Sign In</h2>
    <div id="loginError" class="error-message"></div>
    <input type="email" id="loginEmail" placeholder="Email" autocomplete="email">
    <input type="password" id="loginPassword" placeholder="Password" autocomplete="current-password">
    <button onclick="handleLogin()">Sign In</button>
    <div class="auth-toggle">
      Don't have an account? <a onclick="toggleAuthForm()">Sign Up</a>
    </div>
  </div>

  <!-- Signup Form -->
  <div id="signupForm" class="auth-form" style="display: none;">
    <h2>Create Account</h2>
    <div id="signupError" class="error-message"></div>
    <input type="email" id="signupEmail" placeholder="Email" autocomplete="email">
    <input type="password" id="signupPassword" placeholder="Password" autocomplete="new-password">
    <input type="password" id="signupConfirmPassword" placeholder="Confirm Password" autocomplete="new-password">
    <button onclick="handleSignup()">Sign Up</button>
    <div class="auth-toggle">
      Already have an account? <a onclick="toggleAuthForm()">Sign In</a>
    </div>
  </div>
</div>

<!-- Main App Container -->
<div id="appContainer" style="display: none;">
  <header>
    <h1 onclick="goHome()">pirated untitled</h1>
    <div class="header-actions">
      <span class="user-email" id="userEmail"></span>
      <button class="btn" onclick="createAlbum()">make an album</button>
      <button class="btn btn-logout" onclick="handleLogout()">Logout</button>
    </div>
  </header>

  <div id="home" class="album-grid"></div>

  <div id="albumPage" class="album-view">
    <div class="album-header">
      <img id="albumCover" class="cover-large">
      <div class="album-info">
        <input type="text" id="albumTitle" placeholder="Album Title">
        <button onclick="saveAlbumTitle()">Save Title</button>
        <button onclick="deleteCurrentAlbum()" style="background: #ff6b6b;">Delete Album</button>
      </div>
    </div>

    <div>
      <input type="file" id="songUpload" multiple accept="audio/*">
      <button class="btn" onclick="addSongs()">add tracks</button>
    </div>

    <div id="trackList"></div>
  </div>

  <div class="player">
    <div id="nowPlaying">no track</div>
    <audio id="audioPlayer" controls></audio>
  </div>
</div>

<script src="auth.js"></script>
<script src="script.js"></script>

</body>
</html>
